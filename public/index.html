<!DOCTYPE html>
<html>
<head>
  <title>GPS Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: Arial; text-align: center; }
    #map { height: 450px; margin-top: 10px; }
    #logs {
      height:150px;
      overflow:auto;
      border:1px solid gray;
      margin-top:10px;
      text-align:left;
      padding:5px;
      background:#f9f9f9;
    }
  </style>
</head>

<body>

<h2>📡 GPS Geofence Tracker</h2>

<p id="status">Status: --</p>
<p id="lastSeen">Last Seen: --</p>

Radius: <span id="rval">300</span> m<br>
<input type="range" min="50" max="1000" value="300" id="slider">

<div id="map"></div>

<h3>📡 Logs</h3>
<div id="logs"></div>

<script>

// -------- MAP --------
let map = L.map('map').setView([21.125, 79.046], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let marker = L.marker([21.125, 79.046]).addTo(map);

let circle = L.circle([21.125, 79.046], {
  radius: 300,
  color: 'blue'
}).addTo(map);

let radius = 300;
let firstFix = true;

// -------- SLIDER --------
const slider = document.getElementById("slider");

slider.oninput = async function () {
  radius = this.value;
  document.getElementById("rval").innerText = radius;

  circle.setRadius(radius);

  await fetch("/radius", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ radius })
  });
};

// -------- SYNC RADIUS --------
async function syncRadius() {
  let res = await fetch("/radius");
  let data = await res.json();

  radius = parseInt(data.radius);
  slider.value = radius;
  document.getElementById("rval").innerText = radius;

  circle.setRadius(radius);
}

// -------- LOCATION --------
async function updateLocation() {
  let res = await fetch("/location");
  let data = await res.json();

  // 🔴 OFFLINE
  if (!data.online) {
    document.getElementById("status").innerText = "DEVICE OFFLINE ❌";

    marker.setIcon(new L.Icon({
      iconUrl: 'https://maps.google.com/mapfiles/ms/icons/grey-dot.png',
      iconSize: [32,32]
    }));

    if (data.lastSeen) {
      let t = new Date(data.lastSeen).toLocaleTimeString("en-IN");
      document.getElementById("lastSeen").innerText = "Last Seen: " + t;
    }

    return;
  }

  // 🟢 ONLINE
  if (!data.lat || !data.lon) return;

  marker.setLatLng([data.lat, data.lon]);

  if (firstFix) {
    map.setView([data.lat, data.lon], 16);
    firstFix = false;
  }

  if (data.lastSeen) {
    let t = new Date(data.lastSeen).toLocaleTimeString("en-IN");
    document.getElementById("lastSeen").innerText = "Last Seen: " + t;
  }

  if (data.homeLat && data.homeLon) {
    circle.setLatLng([data.homeLat, data.homeLon]);

    let distance = map.distance(
      [data.homeLat, data.homeLon],
      [data.lat, data.lon]
    );

    if (distance > radius) {
      document.getElementById("status").innerText = "OUTSIDE 🚨";

      marker.setIcon(new L.Icon({
        iconUrl: 'https://maps.google.com/mapfiles/ms/icons/red-dot.png',
        iconSize: [32,32]
      }));

    } else {
      document.getElementById("status").innerText = "INSIDE ✅";

      marker.setIcon(new L.Icon({
        iconUrl: 'https://maps.google.com/mapfiles/ms/icons/green-dot.png',
        iconSize: [32,32]
      }));
    }
  }
}

// -------- LOGS --------
async function loadLogs() {
  let res = await fetch("/logs");
  let data = await res.json();

  let div = document.getElementById("logs");
  div.innerHTML = "";

  data.slice().reverse().forEach(log => {
    let p = document.createElement("p");

    if (log.includes("OUTSIDE")) p.style.color = "red";
    else if (log.includes("INSIDE")) p.style.color = "green";
    else if (log.includes("Radius")) p.style.color = "blue";

    p.innerText = log;
    div.appendChild(p);
  });
}

// -------- AUTO --------
setInterval(updateLocation, 3000);
setInterval(syncRadius, 5000);
setInterval(loadLogs, 3000);

syncRadius();
loadLogs();

</script>

</body>
</html>
