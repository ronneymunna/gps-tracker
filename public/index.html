<!DOCTYPE html>
<html>
<head>
  <title>GPS Tracker</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

<h2>GPS Tracker (OpenStreetMap)</h2>

<div>
  <label>Latitude:</label>
  <input id="lat" type="number" step="any"><br>

  <label>Longitude:</label>
  <input id="lon" type="number" step="any"><br>

  <label>Radius (meters):</label>
  <input id="radius" type="number"><br>

  <button onclick="setGeofence()">Set Geofence</button>
</div>

<br>

<div id="map" style="height:500px;"></div>

<script>
let map, marker, circle;

const server = "https://gps-tracker-1-yojw.onrender.com"; // your backend

// ---------------- INIT MAP ----------------
function initMap() {

  map = L.map('map').setView([19.0760, 72.8777], 15);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  marker = L.marker([19.0760, 72.8777]).addTo(map);
}

// ---------------- LOAD LOCATION ----------------
async function loadLocation() {
  const res = await fetch(server + "/location");
  const data = await res.json();

  if (data.lat) {
    const pos = [data.lat, data.lon];

    marker.setLatLng(pos);
    map.setView(pos);
  }
}

// ---------------- LOAD GEOFENCE ----------------
async function loadGeofence() {
  const res = await fetch(server + "/geofence");
  const data = await res.json();

  document.getElementById("lat").value = data.lat;
  document.getElementById("lon").value = data.lon;
  document.getElementById("radius").value = data.radius;

  drawCircle(data);
}

// ---------------- DRAW CIRCLE ----------------
function drawCircle(data) {

  if (circle) {
    map.removeLayer(circle);
  }

  circle = L.circle([data.lat, data.lon], {
    radius: data.radius,
    color: 'red',
    fillOpacity: 0.2
  }).addTo(map);
}

// ---------------- SET GEOFENCE ----------------
async function setGeofence() {

  const lat = parseFloat(document.getElementById("lat").value);
  const lon = parseFloat(document.getElementById("lon").value);
  const radius = parseInt(document.getElementById("radius").value);

  await fetch(server + "/geofence", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ lat, lon, radius })
  });

  drawCircle({ lat, lon, radius });
}

// ---------------- AUTO REFRESH ----------------
setInterval(loadLocation, 5000);

// ---------------- START ----------------
initMap();
loadGeofence();

</script>

</body>
</html>
