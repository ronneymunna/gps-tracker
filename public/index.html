<!DOCTYPE html>
<html>
<head>
  <title>Live GPS Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: Arial; text-align: center; }
    #map { height: 450px; margin-top: 10px; }
    #logs {
      height:150px;
      overflow:auto;
      border:1px solid gray;
      margin-top:10px;
      text-align:left;
      padding:5px;
      background:#f9f9f9;
    }
  </style>
</head>

<body>

<h2>📡 Live GPS Geofence Tracker</h2>

<p id="status">Status: --</p>

Radius: <span id="rval">300</span> m<br>
<input type="range" min="50" max="1000" value="300" id="slider">

<div id="map"></div>

<h3>📡 Device Logs</h3>
<div id="logs"></div>

<script>

// MAP
let map = L.map('map').setView([21.125, 79.046], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let marker = L.marker([21.125, 79.046]).addTo(map);

let circle = L.circle([21.125, 79.046], {
  radius: 300,
  color: 'blue'
}).addTo(map);

let radius = 300;
let firstFix = true;

// SLIDER
const slider = document.getElementById("slider");

slider.oninput = async function () {
  radius = this.value;
  document.getElementById("rval").innerText = radius;

  circle.setRadius(radius);

  await fetch("/radius", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ radius })
  });
};

// SYNC RADIUS
let isUserChanging = false;

slider.addEventListener("mousedown", () => isUserChanging = true);
slider.addEventListener("mouseup", () => isUserChanging = false);

async function syncRadius() {
  let res = await fetch("/radius");
  let data = await res.json();

  if (!isUserChanging) {
    radius = parseInt(data.radius);
    slider.value = radius;
    document.getElementById("rval").innerText = radius;
    circle.setRadius(radius);
  }
}

// LOCATION
async function updateLocation() {
  let res = await fetch("/location");
  let data = await res.json();

  if (!data.lat || !data.lon) return;

  marker.setLatLng([data.lat, data.lon]);

  if (firstFix) {
    map.setView([data.lat, data.lon], 16);
    firstFix = false;
  }

  if (data.homeLat && data.homeLon) {
    circle.setLatLng([data.homeLat, data.homeLon]);

    let distance = map.distance(
      [data.homeLat, data.homeLon],
      [data.lat, data.lon]
    );

    if (distance > radius) {
      document.getElementById("status").innerText = "OUTSIDE 🚨";
    } else {
      document.getElementById("status").innerText = "INSIDE ✅";
    }
  }
}

// LOGS
async function loadLogs() {
  let res = await fetch("/logs");
  let data = await res.json();

  let div = document.getElementById("logs");
  div.innerHTML = "";

  data.slice().reverse().forEach(log => {
    let p = document.createElement("p");

    if (log.includes("OUTSIDE")) p.style.color = "red";
    else if (log.includes("INSIDE")) p.style.color = "green";
    else if (log.includes("Radius")) p.style.color = "blue";

    p.innerText = log;
    div.appendChild(p);
  });
}

// AUTO RUN
setInterval(updateLocation, 3000);
setInterval(syncRadius, 3000);
setInterval(loadLogs, 3000);

syncRadius();
loadLogs();

</script>

</body>
</html>
