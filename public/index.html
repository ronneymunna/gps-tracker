<!DOCTYPE html>
<html>
<head>
  <title>Live GPS Geofence Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: Arial; text-align: center; }
    #map { height: 450px; margin-top: 10px; }
    #logs {
      height:150px;
      overflow:auto;
      border:1px solid gray;
      margin-top:10px;
      text-align:left;
      padding:5px;
      background:#f9f9f9;
    }
  </style>
</head>

<body>

<h2>📡 Live GPS Geofence Tracker</h2>

<p id="status">Status: --</p>

Radius: <span id="rval">300</span> m<br>
<input type="range" min="50" max="1000" value="300" id="slider">

<div id="map"></div>

<h3>📡 Device Logs</h3>
<div id="logs"></div>

<script>

// -------- MAP SETUP --------
let map = L.map('map').setView([21.125, 79.046], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let marker = L.marker([21.125, 79.046]).addTo(map);

let circle = L.circle([21.125, 79.046], {
  radius: 300,
  color: 'blue'
}).addTo(map);

let radius = 300;
let firstFix = true;

// -------- SLIDER --------
const slider = document.getElementById("slider");

slider.oninput = async function () {
  radius = this.value;
  document.getElementById("rval").innerText = radius;

  circle.setRadius(radius);

  await fetch("/radius", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ radius })
  });
};

// -------- SYNC RADIUS --------
let isUserChanging = false;

slider.addEventListener("mousedown", () => isUserChanging = true);
slider.addEventListener("mouseup", () => isUserChanging = false);
slider.addEventListener("touchstart", () => isUserChanging = true);
slider.addEventListener("touchend", () => isUserChanging = false);

async function syncRadius() {
  try {
    let res = await fetch("/radius");
    let data = await res.json();

    if (!isUserChanging) {
      radius = parseInt(data.radius);

      slider.value = radius;
      document.getElementById("rval").innerText = radius;

      circle.setRadius(radius);
    }

  } catch (err) {
    console.log("Radius sync error:", err);
  }
}

// -------- LOCATION UPDATE --------
async function updateLocation() {
  try {
    let res = await fetch("/location");
    let data = await res.json();

    let lat = data.lat;
    let lon = data.lon;
    let homeLat = data.homeLat;
    let homeLon = data.homeLon;

    // Ignore invalid data
    if (!lat || !lon) return;

    marker.setLatLng([lat, lon]);

    // Only center map first time
    if (firstFix) {
      map.setView([lat, lon], 16);
      firstFix = false;
    }

    if (homeLat && homeLon) {
      circle.setLatLng([homeLat, homeLon]);

      let distance = map.distance([homeLat, homeLon], [lat, lon]);

      if (distance > radius) {
        document.getElementById("status").innerText = "Status: OUTSIDE 🚨";

        marker.setIcon(new L.Icon({
          iconUrl: 'https://maps.google.com/mapfiles/ms/icons/red-dot.png',
          iconSize: [32,32]
        }));

      } else {
        document.getElementById("status").innerText = "Status: INSIDE ✅";

        marker.setIcon(new L.Icon({
          iconUrl: 'https://maps.google.com/mapfiles/ms/icons/green-dot.png',
          iconSize: [32,32]
        }));
      }
    }

  } catch (err) {
    console.log("Location error:", err);
  }
}

// -------- LOAD LOGS --------
async function loadLogs() {
  try {
    let res = await fetch("/logs");
    let data = await res.json();

    let logDiv = document.getElementById("logs");
    logDiv.innerHTML = "";

    data.slice().reverse().forEach(log => {
      let p = document.createElement("p");
      p.innerText = log;
      logDiv.appendChild(p);
    });

  } catch (e) {
    console.log("Log error", e);
  }
}

// -------- AUTO RUN --------
setInterval(updateLocation, 3000);
setInterval(syncRadius, 3000);
setInterval(loadLogs, 3000);

// Initial load
syncRadius();
loadLogs();

</script>

</body>
</html>
