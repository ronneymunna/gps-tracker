<!DOCTYPE html>
<html>
<head>
  <title>Live GPS Geofence</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: Arial; text-align: center; }
    #map { height: 450px; margin-top: 10px; }
  </style>
</head>

<body>

<h2>📡 Live GPS Geofence Tracker</h2>

<p id="status">Status: --</p>

Radius: <span id="rval">300</span> m<br>
<input type="range" min="50" max="1000" value="300" id="slider">

<div id="map"></div>

<script>

// Map initial
let map = L.map('map').setView([21.125, 79.046], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

// Marker (device)
let marker = L.marker([21.125, 79.046]).addTo(map);

// Geofence circle
let circle = L.circle([21.125, 79.046], {
  radius: 300,
  color: 'blue'
}).addTo(map);

let radius = 300;

// 🎚️ Radius slider
document.getElementById("slider").oninput = async function () {
  radius = this.value;
  document.getElementById("rval").innerText = radius;

  circle.setRadius(radius);

  await fetch("/radius", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ radius })
  });
};

// 📡 Fetch location
async function updateLocation() {
  try {
    let res = await fetch("/location");
    let data = await res.json();

    let lat = data.lat;
    let lon = data.lon;
    let homeLat = data.homeLat;
    let homeLon = data.homeLon;

    // Move marker
    marker.setLatLng([lat, lon]);

    // Set geofence center
    if (homeLat !== null && homeLon !== null) {
      circle.setLatLng([homeLat, homeLon]);

      let distance = map.distance(
        [homeLat, homeLon],
        [lat, lon]
      );

      // Status display
      if (distance > radius) {
        document.getElementById("status").innerText = "Status: OUTSIDE 🚨";

        marker.setIcon(new L.Icon({
          iconUrl: 'https://maps.google.com/mapfiles/ms/icons/red-dot.png',
          iconSize: [32,32]
        }));
      } else {
        document.getElementById("status").innerText = "Status: INSIDE ✅";

        marker.setIcon(new L.Icon({
          iconUrl: 'https://maps.google.com/mapfiles/ms/icons/green-dot.png',
          iconSize: [32,32]
        }));
      }
    }

    map.setView([lat, lon], 16);

  } catch (err) {
    console.log(err);
  }
}

// 🔄 Refresh every 3 sec
setInterval(updateLocation, 3000);

</script>

</body>
</html>
